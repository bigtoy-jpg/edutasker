{% extends "base.html" %}

{% block title %}Calendar{% endblock %}

{% block content %}
<div class="calendar-page">
    <div class="calendar-header">
        <h2><i class="fas fa-calendar-alt"></i> Task Calendar</h2>
        <div class="calendar-controls">
            <button id="prevMonth" class="btn btn-secondary">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h3 id="currentMonth"></h3>
            <button id="nextMonth" class="btn btn-secondary">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
    
    <div class="calendar-container">
        <div class="calendar-grid">
            <div class="calendar-weekdays">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <div id="calendarDays" class="calendar-days">
                <!-- Calendar days will be generated by JavaScript -->
            </div>
        </div>
        
        <div class="calendar-sidebar">
            <h3><i class="fas fa-list"></i> Upcoming Tasks</h3>
            <div id="upcomingTasks" class="upcoming-tasks">
                <!-- Upcoming tasks will be populated by JavaScript -->
            </div>
        </div>
    </div>
</div>

<!-- Task Detail Modal -->
<div id="taskModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTaskTitle"></h3>
            <button class="modal-close" onclick="closeTaskModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong>Description:</strong> <span id="modalTaskDescription"></span></p>
            <p><strong>Category:</strong> <span id="modalTaskCategory"></span></p>
            <p><strong>Difficulty:</strong> <span id="modalTaskDifficulty"></span></p>
            <p><strong>Due Date:</strong> <span id="modalTaskDueDate"></span></p>
            <div class="modal-actions">
                <a href="#" id="modalTaskLink" class="btn btn-primary">View Task</a>
                <button class="btn btn-secondary" onclick="closeTaskModal()">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
// Calendar data
const events = {{ events|tojson }};
let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();

// Month names
const monthNames = ["January", "February", "March", "April", "May", "June",
                   "July", "August", "September", "October", "November", "December"];

// Initialize calendar
function initCalendar() {
    renderCalendar();
    renderUpcomingTasks();
}

function renderCalendar() {
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;
    
    let html = '';
    let dayCount = 1;
    
    // Empty cells for days before month starts
    for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day empty"></div>';
    }
    
    // Days of the month
    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = events.filter(event => event.date === dateStr);
        const isToday = isCurrentDay(day);
        
        html += `<div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}">`;
        html += `<div class="day-number">${day}</div>`;
        
        if (dayEvents.length > 0) {
            html += '<div class="day-events">';
            dayEvents.slice(0, 3).forEach(event => {
                html += `<div class="event-dot ${event.category}" onclick="showTaskDetails('${event.task_id}')" title="${event.title}"></div>`;
            });
            if (dayEvents.length > 3) {
                html += `<div class="event-more">+${dayEvents.length - 3}</div>`;
            }
            html += '</div>';
        }
        
        html += '</div>';
    }
    
    document.getElementById('calendarDays').innerHTML = html;
}

function renderUpcomingTasks() {
    const today = new Date();
    const upcoming = events
        .filter(event => new Date(event.date) >= today)
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .slice(0, 10);
    
    let html = '';
    upcoming.forEach(event => {
        html += `
            <div class="upcoming-task ${event.completed ? 'completed' : ''}" onclick="showTaskDetails('${event.task_id}')">
                <div class="task-date">${formatDate(event.date)}</div>
                <div class="task-title">${event.title}</div>
                <div class="task-meta">
                    <span class="category ${event.category}">${event.category}</span>
                    <span class="difficulty ${event.difficulty}">${event.difficulty}</span>
                </div>
            </div>
        `;
    });
    
    document.getElementById('upcomingTasks').innerHTML = html || '<p>No upcoming tasks</p>';
}

function isCurrentDay(day) {
    const today = new Date();
    return day === today.getDate() && 
           currentMonth === today.getMonth() && 
           currentYear === today.getFullYear();
}

function formatDate(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function showTaskDetails(taskId) {
    const task = events.find(event => event.task_id === taskId);
    if (!task) return;
    
    document.getElementById('modalTaskTitle').textContent = task.title;
    document.getElementById('modalTaskDescription').textContent = task.description || 'No description';
    document.getElementById('modalTaskCategory').textContent = task.category;
    document.getElementById('modalTaskDifficulty').textContent = task.difficulty;
    document.getElementById('modalTaskDueDate').textContent = formatDate(task.date);
    document.getElementById('modalTaskLink').href = `/tasks/${taskId}/edit`;
    
    document.getElementById('taskModal').style.display = 'block';
}

function closeTaskModal() {
    document.getElementById('taskModal').style.display = 'none';
}

// Navigation
document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
    }
    renderCalendar();
});

document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
    }
    renderCalendar();
});

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('taskModal');
    if (event.target == modal) {
        closeTaskModal();
    }
}

// Initialize on load
document.addEventListener('DOMContentLoaded', initCalendar);
</script>
{% endblock %}
