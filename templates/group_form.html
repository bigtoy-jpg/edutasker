{% extends "base.html" %}

{% block title %}Create Study Group{% endblock %}

{% block content %}
<div class="group-form-page">
    <h2><i class="fas fa-users"></i> Create Study Group</h2>
    
    <form method="POST" class="group-form">
        <div class="form-group">
            <label for="name">Group Name *</label>
            <input type="text" id="name" name="name" required 
                   placeholder="Enter group name">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" 
                      placeholder="Describe the purpose and goals of this study group"></textarea>
        </div>
        
        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" id="is_private" name="is_private">
                <label for="is_private">
                    <i class="fas fa-lock"></i> Make this group private
                    <small>Only invited members can join private groups</small>
                </label>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus"></i> Create Group
            </button>
            <a href="/groups" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
